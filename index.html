    <script>
function verifierMotDePasse(motDePasseAttendu, pageCible) {
    var saisie = prompt("Accès restreint : Veuillez entrer le mot de passe pour accéder à cette section :");

    if (saisie === motDePasseAttendu) {
        window.location.href = pageCible;
    } else if (saisie != null) {
        alert("Mot de passe incorrect. Accès refusé.");
    }
}
</script>
